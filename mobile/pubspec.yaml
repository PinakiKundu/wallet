name: pipay_app
description: PiPay mobile app for wallet add-money and merchant payments.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  uuid: ^4.4.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
